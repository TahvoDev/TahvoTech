<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>

.iconbox {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  border-radius: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.iconbox-logo img {
  width: 10px;
  height: 10px;
  object-fit: cover;
  justify-content: center;
  align-items: center;
}


.container {
  text-align: center;
  padding-top: 20px;
}

.button-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 5px;
}
.button, .buttonsmall, .bio, .header {
  font-family: "Poppins";
}

.button {
    display: flex;
    align-items: center;
    padding: 0.625rem 0.9375rem;
    border-radius: 0.3125rem;
    font-size: 1.125rem;
    font-weight: bold;
    cursor: pointer;
    overflow: hidden;
    background-color: #333;
    color: white;
    transition: ease-in-out, background-color 0.2s, color 0.2s;
    width: 90%;
    max-width: 500px;
    min-width: 250px;
    margin-bottom: 0.3125rem;
    text-align: left;
    text-decoration: none;
    box-sizing: border-box;
}


.buttonsmall {
    display: flex;
    align-items: center;
    padding: 0.625rem 0.9375rem;
    border-radius: 0.3125rem;
    font-size: 1.125rem;
    font-weight: bold;
    cursor: pointer;
    overflow: hidden;
    background-color: #333;
    color: white;
    transition: ease-in-out, background-color 0.2s, color 0.2s;
    text-align: left;
    text-decoration: none;
    box-sizing: border-box;
}

@media (min-aspect-ratio: 1/1) {
    .button {
        width: 50%; /* For landscape screens, use 50% width */
    }
    .button-row {
        width: 50%;
    }
}

.button:hover, .buttonsmall:hover {
    background-color: #555;
    transform: scale(1.05);
}

.button.active {
  background-color: white;
  color: black;
  cursor: default;
  transform: none;
}

.button .button-inner, .buttonsmall .button-inner {
  flex-grow: 1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-width: 0;
}

.profile img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background-color: #333;
  margin: 0 auto 10px;
}

.button-text {
  flex: 1;
  padding-left: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

.button img, .buttonsmall img {
  width: 36px;
  height: 36px;
  border-radius: 5px;
  margin-right: 10px;
  flex-shrink: 0;
}

.secondary-text {
  font-size: 12px;
  color: #aaa;
  white-space: nowrap;
}

.email-button {
  background-color: #444;
  justify-content: center;
  text-align: center;
}

.email-button .button-inner {
  flex-direction: column;
  justify-content: center;
}

.email-button .button-text {
  flex: none;
  padding-right: 0;
  padding-left: 10px;
}

.email-button img {
  margin-right: 10px;
  margin-left: 0;
}

.button-row {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  align-items: stretch;
  justify-content: space-between;
  gap: 0.3125rem;
  width: 90%;
  max-width: 500px;
  min-width: 250px;
  margin: 0 auto 0.3125rem;
  box-sizing: border-box;
}

.button-row .buttonsmall {
  flex: 1 1 0;
  min-width: 0;
  margin-bottom: 0;
  width: auto;
  max-width: none;
  padding: 0.625rem clamp(0.4rem, 2vw, 0.9375rem);
  font-size: clamp(0.85rem, 3.2vw, 1.125rem);
}

.button-row .iconbox {
  width: clamp(24px, 8vw, 32px);
  height: clamp(24px, 8vw, 32px);
}

.button-row .buttonsmall img {
  width: 100%;
  height: 100%;
  margin-right: 0;
}

.button-row .button-text {
  padding-left: clamp(6px, 2vw, 10px);
}

</style>
<script>
  function handleButtonClick(url, event) {
    if (event.button === 1 || event.button === 4) {
      window.open(url, '_blank');
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    const buttons = document.querySelectorAll(".button, .buttonsmall");

    buttons.forEach(function(button) {
      button.addEventListener("mouseup", function(event) {
        const url = this.getAttribute("href");
        if (url != null) {
          handleButtonClick(url, event);
        }
      });
    });
  });

  function generateEmailLink() {
    var user = 'tahvobiz';
    var domain = 'pm.me';
    var element = document.getElementById('protected-email');

    var emailButton = document.getElementById('protected-email-button');
    emailButton.classList.add('active');
    emailButton.innerHTML = '<div class="button-inner"><span class="button-text">' + user + '@' + domain + '</span></div>';
    emailButton.removeAttribute('onclick');
  }

  function emailButtonClickHandler(event) {
    generateEmailLink();
  }
</script>
</head>
<body>

<div class="container">
  <div class="profile">
    <img src="images/icon_400x400.jpg" alt="Profile Picture">
  </div>

  <div class="header">
    <strong>Tahvo</strong>
  </div>

  <div class="bio">
    Companion in the Virutal World
  </div>

  <div class="button-container">
    <a class="button youtube-button" href="https://ko-fi.com/tahvo">
      <div class="button-inner">
        <div class="iconbox">
          <img src="images/icons/kofi.png" style="background-color: #72A5F2" alt="Image">
        </div>
        <span class="button-text">Support on Ko-Fi!</span>
      </div>
      <span class="secondary-text">❤️</span>
    </a>
  </div>

  <div class="button-container">
    <a class="button youtube-button" href="https://www.youtube.com/channel/UCCQNkmRNM3fPbYeo4XQKogw?sub_confirmation=1">
      <div class="button-inner">
        <div class="iconbox">
          <img src="images/icons/youtube.png" style="background-color: #ff0000;" alt="Image">
        </div>
        <span class="button-text">YouTube</span>
      </div>
      <span class="secondary-text">Full Videos</span>
    </a>
  </div>

  <div class="button-container">
    <a class="button" href="https://www.tiktok.com/@tahvovr">
      <div class="button-inner">
        <div class="iconbox">
          <img src="images/icons/tiktok.png" style="background-color: #000000;" alt="Image">
        </div>
        <span class="button-text">TikTok</span>
      </div>
      <span class="secondary-text">Fun Shorts</span>
    </a>
  </div>

  <div class="button-container">
    <a class="button" href="https://www.twitch.tv/tahvolive">
      <div class="button-inner">
        <div class="iconbox">
          <img src="images/icons/twitch.png" style="background-color: #9146ff;" alt="Image">
        </div>
        <span class="button-text">Twitch</span>
      </div>
      <span class="secondary-text">Watch Live</span>
    </a>
  </div>

  <div class="button-container">
  <div class="button-row">
    <a class="buttonsmall" href="https://bsky.app/profile/tahvo.tech">
      <div class="button-inner">
        <div class="iconbox">
          <img src="images/icons/bluesky.png" style="background-color: #4ca2fe;" alt="Image">
        </div>
        <span class="button-text">BlueSky</span>
      </div>
    </a>
    <a class="buttonsmall" href="https://x.com/TahvoVR">
      <div class="button-inner">
        <div class="iconbox">
          <img src="images/icons/x.png" style="background-color: #000000;" alt="Image">
        </div>
        <span class="button-text">X</span>
      </div>
    </a>
    <a class="buttonsmall" href="https://discord.gg/rapYz8Xqt5">
      <div class="button-inner">
        <div class="iconbox">
          <img src="images/icons/discord.png" style="background-color: #5865F2;" alt="Image">
        </div>
        <span class="button-text">Discord</span>
      </div>
    </a>
  </div>
  </div>

  <div class="button-container">
    <div id="protected-email-button" class="button email-button" onclick="generateEmailLink();">
      <div class="button-inner">
        <span class="button-text">View Business Email</span>
      </div>
    </div>
    <div id="protected-email" style="display:none;"></div>
  </div>
</div>
</body>
</html>
