<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahvo - Exploring Virtual Worlds</title>
  <meta name="description" content="Tahvo's links — YouTube, Twitch, TikTok, BlueSky, X, and Discord. Exploring virtual worlds.">

  <!-- Google Fonts (Poppins), loaded without blocking initial render -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  </noscript>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="container">

    <div class="profile" id="profile">
      <img src="images/icon_400x400.webp" alt="Profile Picture" width="80" height="80" fetchpriority="high">
    </div>

    <div class="header">
      <strong>Tahvo</strong>
    </div>

    <div class="bio">
      Exploring Virtual Worlds
    </div>

    <!-- Ko-fi -->
    <div class="button-container">
      <a class="button" href="https://ko-fi.com/tahvo">
        <div class="button-inner">
          <div class="iconbox">
            <img src="images/icons/kofi.webp" style="background-color: #72A5F2" alt="Ko-fi" width="36" height="36" loading="lazy">
          </div>
          <span class="button-text">Support on Ko-Fi!</span>
        </div>
        <span class="secondary-text">❤️</span>
      </a>
    </div>

    <!-- YouTube -->
    <div class="button-container">
      <a class="button" href="https://www.youtube.com/channel/UCCQNkmRNM3fPbYeo4XQKogw?sub_confirmation=1">
        <div class="button-inner">
          <div class="iconbox">
            <img src="images/icons/youtube.webp" style="background-color: #ff0000;" alt="YouTube" width="36" height="36" loading="lazy">
          </div>
          <span class="button-text">YouTube</span>
        </div>
      </a>
    </div>

    <!-- Twitch (shows a LIVE badge + glowing avatar ring when streaming) -->
    <div class="button-container">
      <a class="button" href="https://www.twitch.tv/tahvolive">
        <div class="button-inner">
          <div class="iconbox">
            <img src="images/icons/twitch.webp" style="background-color: #9146ff;" alt="Twitch" width="36" height="36" loading="lazy">
          </div>
          <span class="button-text">Twitch</span>
        </div>
        <span class="secondary-text" id="twitch-status-text"></span>
      </a>
    </div>

    <!-- TikTok -->
    <div class="button-container">
      <a class="button" href="https://www.tiktok.com/@tahvovr">
        <div class="button-inner">
          <div class="iconbox">
            <img src="images/icons/tiktok.webp" style="background-color: #000000;" alt="TikTok" width="36" height="36" loading="lazy">
          </div>
          <span class="button-text">TikTok</span>
        </div>
      </a>
    </div>

    <!-- BlueSky / X / Discord share one equal-width icon row -->
    <div class="button-container">
      <div class="button-row">
        <a class="buttonsmall" href="https://bsky.app/profile/tahvo.tech" aria-label="BlueSky">
          <div class="button-inner">
            <div class="iconbox">
              <img src="images/icons/bluesky.webp" style="background-color: #4ca2fe;" alt="BlueSky" width="36" height="36" loading="lazy">
            </div>
          </div>
        </a>
        <a class="buttonsmall" href="https://x.com/TahvoVR" aria-label="X (Twitter)">
          <div class="button-inner">
            <div class="iconbox">
              <img src="images/icons/x.webp" style="background-color: #000000;" alt="X" width="36" height="36" loading="lazy">
            </div>
          </div>
        </a>
        <a class="buttonsmall" href="https://discord.gg/rapYz8Xqt5" aria-label="Discord">
          <div class="button-inner">
            <div class="iconbox">
              <img src="images/icons/discord.webp" style="background-color: #5865F2;" alt="Discord" width="36" height="36" loading="lazy">
            </div>
          </div>
        </a>
      </div>
    </div>

    <div class="business-inquiries-label">Business Inquiries</div>
    <div class="business-email-line" id="business-email"></div>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
